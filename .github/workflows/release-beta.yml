name: Release Beta APK

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in format x.y.z
        required: true
      notes:
        description: Release notes shown in beta/version.json
        required: false
        default: Beta release channel.

permissions:
  actions: write
  contents: write

jobs:
  release-beta:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Prepare keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore

      - name: Update app version
        run: npm run app:version:set -- ${{ github.event.inputs.version }}

      - name: Sync web assets into Android
        run: npm run cap:android

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare beta asset
        run: |
          mkdir -p dist
          cp "android/app/build/outputs/apk/release/work-shift-calendar-${{ github.event.inputs.version }}.apk" \
             "dist/work-shift-calendar-${{ github.event.inputs.version }}-beta.apk"

      - name: Publish beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}-beta
          name: Beta ${{ github.event.inputs.version }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          files: dist/work-shift-calendar-${{ github.event.inputs.version }}-beta.apk

      - name: Update beta manifest
        run: >
          npm run manifest:set -- beta
          ${{ github.event.inputs.version }}
          https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version }}-beta/work-shift-calendar-${{ github.event.inputs.version }}-beta.apk
          "${{ github.event.inputs.notes }}"

      - name: Commit release metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json data/config.js android/app/build.gradle beta/version.json
          git commit -m "chore: release beta ${{ github.event.inputs.version }}" || exit 0
          git push origin HEAD:${{ github.ref_name }}

      - name: Trigger GitHub Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref ${{ github.ref_name }}
