name: Release Beta APK

on:
  push:
    tags:
      - beta-*
  workflow_dispatch:
    inputs:
      version:
        description: Version in format x.y.z
        required: true
      notes:
        description: Release notes shown in beta/version.json
        required: false
        default: Beta release channel.

permissions:
  actions: write
  contents: write

jobs:
  release-beta:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Resolve release inputs
        id: release_input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#beta-}"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          NOTES="${{ github.event.inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Beta release channel."
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Prepare keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          test -n "$ANDROID_KEYSTORE_BASE64"
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/release.keystore

      - name: Update app version
        run: npm run app:version:set -- ${{ steps.release_input.outputs.version }}

      - name: Sync web assets into Android
        run: npm run cap:android

      - name: Build signed release APK
        working-directory: android
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/android/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Prepare beta asset
        run: |
          mkdir -p dist
          cp "android/app/build/outputs/apk/release/work-shift-calendar-${{ steps.release_input.outputs.version }}.apk" \
             "dist/work-shift-calendar-${{ steps.release_input.outputs.version }}-beta.apk"

      - name: Publish beta release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_input.outputs.version }}-beta
          name: Beta ${{ steps.release_input.outputs.version }}
          prerelease: true
          make_latest: false
          generate_release_notes: true
          overwrite_files: true
          files: dist/work-shift-calendar-${{ steps.release_input.outputs.version }}-beta.apk

      - name: Update beta manifest
        run: >
          npm run manifest:set -- beta
          ${{ steps.release_input.outputs.version }}
          https://github.com/${{ github.repository }}/releases/download/v${{ steps.release_input.outputs.version }}-beta/work-shift-calendar-${{ steps.release_input.outputs.version }}-beta.apk
          "${{ steps.release_input.outputs.notes }}"

      - name: Commit release metadata
        env:
          RELEASE_VERSION: ${{ steps.release_input.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Tag-triggered workflows run on detached HEAD.
          # Create a local branch so rebase/push to the default branch is reliable.
          git checkout -B "ci/release-beta-${RELEASE_VERSION}"

          git add package.json data/config.js android/app/build.gradle beta/version.json
          if git diff --cached --quiet; then
            echo "No release metadata changes to commit."
            exit 0
          fi

          git commit -m "chore: release beta ${RELEASE_VERSION}"
          git fetch origin "${DEFAULT_BRANCH}"
          git rebase --autostash "origin/${DEFAULT_BRANCH}"
          git push origin HEAD:${DEFAULT_BRANCH}
