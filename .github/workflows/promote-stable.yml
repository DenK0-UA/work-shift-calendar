name: Promote Beta To Stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: Version in format x.y.z
        required: true
      notes:
        description: Release notes shown in stable/version.json
        required: false
        default: Stable release channel.

permissions:
  actions: write
  contents: write

jobs:
  promote-stable:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version
        run: |
          VERSION="${{ github.event.inputs.version }}"
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]

      - name: Download beta APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/beta
          gh release download "v${{ github.event.inputs.version }}-beta" \
            --repo "${{ github.repository }}" \
            --pattern "*.apk" \
            --dir dist/beta

      - name: Prepare stable asset
        run: |
          mkdir -p dist
          BETA_APK="$(find dist/beta -name '*.apk' | head -n 1)"
          test -n "$BETA_APK"
          cp "$BETA_APK" "dist/work-shift-calendar-${{ github.event.inputs.version }}.apk"

      - name: Publish stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.event.inputs.version }}
          name: Stable ${{ github.event.inputs.version }}
          prerelease: false
          make_latest: true
          generate_release_notes: true
          files: dist/work-shift-calendar-${{ github.event.inputs.version }}.apk

      - name: Update stable manifest
        run: >
          npm run manifest:set -- stable
          ${{ github.event.inputs.version }}
          https://github.com/${{ github.repository }}/releases/download/v${{ github.event.inputs.version }}/work-shift-calendar-${{ github.event.inputs.version }}.apk
          "${{ github.event.inputs.notes }}"

      - name: Commit stable metadata
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add stable/version.json
          git commit -m "chore: promote stable ${{ github.event.inputs.version }}" || exit 0
          git push origin HEAD:${{ github.ref_name }}

      - name: Trigger GitHub Pages deploy
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref ${{ github.ref_name }}
