name: Promote Beta To Stable

on:
  push:
    tags:
      - stable-*
  workflow_dispatch:
    inputs:
      version:
        description: Version in format x.y.z
        required: true
      notes:
        description: Release notes shown in stable/version.json
        required: false
        default: Stable release channel.

permissions:
  actions: write
  contents: write

jobs:
  promote-stable:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Resolve release inputs
        id: release_input
        run: |
          VERSION="${{ github.event.inputs.version }}"
          if [ -z "$VERSION" ]; then
            VERSION="${GITHUB_REF_NAME#stable-}"
          fi
          [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]
          NOTES="${{ github.event.inputs.notes }}"
          if [ -z "$NOTES" ]; then
            NOTES="Stable release channel."
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "notes=$NOTES" >> "$GITHUB_OUTPUT"

      - name: Download beta APK
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/beta
          gh release download "v${{ steps.release_input.outputs.version }}-beta" \
            --repo "${{ github.repository }}" \
            --pattern "*.apk" \
            --dir dist/beta

      - name: Prepare stable asset
        run: |
          mkdir -p dist
          BETA_APK="$(find dist/beta -name '*.apk' | head -n 1)"
          test -n "$BETA_APK"
          cp "$BETA_APK" "dist/work-shift-calendar-${{ steps.release_input.outputs.version }}.apk"

      - name: Publish stable release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.release_input.outputs.version }}
          name: Stable ${{ steps.release_input.outputs.version }} APK
          prerelease: false
          make_latest: true
          generate_release_notes: false
          body: |
            ⬇️ Завантажуйте тільки файл `work-shift-calendar-${{ steps.release_input.outputs.version }}.apk` у секції **Assets**.

            `Source code (zip)` і `Source code (tar.gz)` додаються самим GitHub автоматично і для встановлення застосунку не потрібні.
          overwrite_files: true
          files: dist/work-shift-calendar-${{ steps.release_input.outputs.version }}.apk

      - name: Update stable manifest
        run: >
          npm run manifest:set -- stable
          ${{ steps.release_input.outputs.version }}
          https://github.com/${{ github.repository }}/releases/download/v${{ steps.release_input.outputs.version }}/work-shift-calendar-${{ steps.release_input.outputs.version }}.apk
          "${{ steps.release_input.outputs.notes }}"

      - name: Commit stable metadata
        env:
          RELEASE_VERSION: ${{ steps.release_input.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Tag-triggered workflows run on detached HEAD.
          # Create a local branch so rebase/push to the default branch is reliable.
          git checkout -B "ci/promote-stable-${RELEASE_VERSION}"

          git add stable/version.json
          if git diff --cached --quiet; then
            echo "No stable metadata changes to commit."
            exit 0
          fi

          git commit -m "chore: promote stable ${RELEASE_VERSION}"
          git fetch origin "${DEFAULT_BRANCH}"
          git rebase --autostash "origin/${DEFAULT_BRANCH}"
          git push origin HEAD:${DEFAULT_BRANCH}
