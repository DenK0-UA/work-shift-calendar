name: Schedule One-Time Stable Release

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  actions: write
  contents: read

concurrency:
  group: schedule-one-time-stable-release
  cancel-in-progress: false

jobs:
  schedule-stable-release:
    runs-on: ubuntu-latest
    env:
      DEFAULT_BRANCH: ${{ github.event.repository.default_branch || 'main' }}
      GITHUB_TOKEN: ${{ github.token }}
      APP_PUBLIC_BASE_URL: ${{ vars.APP_PUBLIC_BASE_URL || 'https://work-shift-calendar.denidinamo.workers.dev' }}

    steps:
      - name: Checkout default branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.repository.default_branch || 'main' }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Evaluate one-time stable release schedule
        run: node scripts/run-one-time-stable-release.mjs
