name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: cloudflare-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_PUBLIC_BASE_URL: ${{ vars.APP_PUBLIC_BASE_URL || 'https://work-shift-calendar.denidinamo.workers.dev' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Build web assets
        run: npm run build:web

      - name: Deploy Worker to Cloudflare
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler deploy

      - name: Smoke test Cloudflare app
        run: |
          set -euo pipefail
          curl -fsSL "$APP_PUBLIC_BASE_URL/" >/dev/null
          curl -fsSL "$APP_PUBLIC_BASE_URL/stable/version.json?nocache=$(date +%s)" | \
            node -e "let data=''; process.stdin.on('data', c => data += c); process.stdin.on('end', () => { const parsed = JSON.parse(data); if (!/^\\d+\\.\\d+\\.\\d+$/.test(parsed.version || '')) process.exit(1); });"
